---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: um-experiment
# description will be included in the image's metadata
description: Testing and experimenting with Ultramarine images

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ultramarine-linux/gnome-bootc
image-version: 44 # latest is also supported if you want new updates ASAP

modules:
  - type: signing
  - type: dnf
    repos:
      files:
        - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
      cleanup: true
    install:
      install-weak-deps: false
      packages:
        - ghostty
        - swayfx
        - mangowm


      
