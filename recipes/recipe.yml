---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: um-experiment
# description will be included in the image's metadata
description: Testing and experimenting with Ultramarine images

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ultramarine-linux/base-bootc
image-version: 44 # latest is also supported if you want new updates ASAP

modules:
  - type: signing
  - type: dnf
    repos:
      cleanup: true
      files:
        - vscodium.repo
      keys:
        - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
    install:
      packages:
        - codium # VSCodium, alternative to VSCode
        - zsh # zsh is available in Fedora repos
    group-install: # Install virtualization tooling
      with-optional: true
      packages:
        - virtualization
  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          url: https://flathub.org/repo/flathub.flatpakrepo
          title: Flathub (system)
        install:
          - io.podman_desktop.PodmanDesktop # Podman desktop
          - me.iepure.devtoolbox # useful devtools
          #- com.github.marhkb.Pods
          - com.ranfdev.DistroShelf # Mange distrbox via GUI
